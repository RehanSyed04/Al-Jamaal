  <link rel="preconnect" href="https://fonts.googleapis.com">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #1a1a1a;
      color: #f0ede8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 32px 24px;
    }
    .logo-arabic {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      color: #C9A96E;
      margin-bottom: 4px;
    }
    .logo-english {
      font-size: 13px;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 48px;
    }
    .logo-english span { color: #C9A96E; }
    .divider {
      width: 48px; height: 2px;
      background: #C9A96E;
      margin: 0 auto 32px;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(24px, 5vw, 40px);
      color: #f0ede8;
      font-weight: 400;
      margin-bottom: 20px;
      line-height: 1.3;
    }
    p {
      font-size: 16px;
      color: #888;
      max-width: 420px;
      line-height: 1.8;
      margin-bottom: 16px;
    }
    .wa-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-top: 32px;
      padding: 14px 28px;
      background: #C9A96E;
      color: #1a1a1a;
      text-decoration: none;
      border-radius: 4px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.5px;
      transition: background 0.2s;
    }
    .wa-btn:hover { background: #b8945a; }
    .wa-icon {
      width: 20px; height: 20px;
      fill: #1a1a1a;
    }
    .footer-note {
      position: fixed;
      bottom: 24px;
      font-size: 12px;
      color: #444;
    }
  </style>
</head>
